<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Reflexy · T3 Manifesto · Post 01</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&family=DM+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_tokens.css">
<style>
  /* T3 · Manifesto Card
     Uso: brand awareness, posicionamento, "por que existimos"
     Texto editorial em italic serif sobre gradient sutil */
  .frame.t3 {
    background: var(--grad-plum-fade);
  }
  .t3 .gem-watermark {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 56px;
    height: 56px;
    opacity: 0.45;
    z-index: 2;
  }
  .t3 .content {
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 200px 110px 180px;
  }
  .t3 .quote {
    font-family: var(--f-serif);
    font-style: italic;
    font-weight: 400;
    font-size: 92px;
    line-height: 1.18;
    letter-spacing: -.01em;
    color: var(--lavender);
    max-width: 880px;
  }
  .t3 .quote .accent {
    color: var(--mist);
  }
  .t3 .signature {
    margin-top: 56px;
    font-family: var(--f-data);
    font-size: 16px;
    letter-spacing: .30em;
    text-transform: uppercase;
    color: var(--dusk);
    display: inline-flex;
    align-items: center;
    gap: 14px;
  }
  .t3 .signature::before {
    content: '';
    width: 28px;
    height: 1px;
    background: var(--verdigris);
    opacity: .7;
  }
</style>
</head>
<body>

<div class="frame t3 grain">

  <!-- Gem watermark topo -->
  <svg class="gem-watermark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#C4B8E4" stop-opacity=".7"/>
        <stop offset="100%" stop-color="#7050A0" stop-opacity=".5"/>
      </linearGradient>
      <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#0CC89E" stop-opacity=".4"/>
        <stop offset="100%" stop-color="#0CC89E" stop-opacity=".05"/>
      </linearGradient>
      <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#E8E2F8" stop-opacity=".9"/>
        <stop offset="100%" stop-color="#B090D8" stop-opacity=".7"/>
      </linearGradient>
    </defs>
    <polygon points="50,22 28,50 3,50 50,3" fill="url(#g1)"/>
    <polygon points="50,22 72,50 97,50 50,3" fill="url(#g1)"/>
    <polygon points="50,78 28,50 3,50 50,97" fill="url(#g2)"/>
    <polygon points="50,78 72,50 97,50 50,97" fill="url(#g2)"/>
    <polygon points="50,22 72,50 50,78 28,50" fill="url(#g3)"/>
    <circle cx="50" cy="50" r="2" fill="#EDE8F6" opacity=".8"/>
  </svg>

  <!-- Content -->
  <div class="content">
    <p class="quote" data-var="hook">
      1 em cada 4 peças de roupa compradas pela internet volta pra loja.
    </p>
    <div class="signature">Reflexy · Manifesto</div>
  </div>

  <!-- Footer -->
  <div class="footer-mark">
    <svg class="gem" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <use href="#gem"/>
      <polygon points="50,22 28,50 3,50 50,3" fill="url(#g1)"/>
      <polygon points="50,22 72,50 97,50 50,3" fill="url(#g1)"/>
      <polygon points="50,78 28,50 3,50 50,97" fill="url(#g2)"/>
      <polygon points="50,78 72,50 97,50 50,97" fill="url(#g2)"/>
      <polygon points="50,22 72,50 50,78 28,50" fill="url(#g3)"/>
    </svg>
    <span class="text">REFLEXY</span>
  </div>
  <div class="footer-handle">@reflexy.co</div>

</div>

</body>
</html>
