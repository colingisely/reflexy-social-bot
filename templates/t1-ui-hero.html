<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Reflexy · T1 UI Hero</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&family=DM+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_tokens.css">
<style>
  /* T1 · UI Hero Mockup
     Uso: anuncio de feature, demo, "como funciona"
     Headline grande + mockup laptop/celular flutuante */
  .t1 .content {
    padding: 80px 64px 0;
  }
  .t1 .headline {
    font-family: var(--f-mark);
    font-weight: 500;
    font-size: 92px;
    line-height: 1.05;
    letter-spacing: -.02em;
    background: var(--grad-text);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-top: 32px;
    max-width: 880px;
  }
  .t1 .sub {
    font-family: var(--f-body);
    font-weight: 400;
    font-size: 24px;
    line-height: 1.5;
    color: var(--dusk);
    margin-top: 24px;
    max-width: 720px;
  }
  .t1 .mockup-wrap {
    position: absolute;
    bottom: 130px;
    left: 50%;
    transform: translateX(-50%);
    width: 920px;
    height: 540px;
    perspective: 1500px;
    z-index: 3;
  }
  .t1 .mockup {
    width: 100%;
    height: 100%;
    background: var(--onyx);
    border-radius: 18px;
    border: 1px solid var(--rule-strong);
    box-shadow:
      0 40px 80px rgba(43,18,80,.45),
      0 0 120px rgba(112,80,160,.30),
      0 0 0 1px rgba(255,255,255,.04) inset;
    overflow: hidden;
    position: relative;
  }
  .t1 .mockup-bar {
    height: 36px;
    background: rgba(6,5,15,.6);
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 8px;
  }
  .t1 .dot { width: 10px; height: 10px; border-radius: 50%; opacity: .6; }
  .t1 .dot.r { background: #FF5A5A; }
  .t1 .dot.y { background: #FFB432; }
  .t1 .dot.g { background: #0CC89E; }
  .t1 .mockup-content {
    height: calc(100% - 36px);
    background: var(--abyss);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    position: relative;
  }
  /* Placeholder UI: substituir por screenshot real depois */
  .t1 .ui-demo {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    width: 100%;
    height: 100%;
  }
  .t1 .ui-card {
    background: var(--onyx);
    border: 1px solid var(--rule);
    border-radius: 12px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .t1 .ui-label {
    font-family: var(--f-data);
    font-size: 11px;
    letter-spacing: .15em;
    color: var(--dusk);
    text-transform: uppercase;
  }
  .t1 .ui-shape {
    width: 100%;
    height: 60%;
    border-radius: 8px;
    background: linear-gradient(135deg, rgba(112,80,160,.25), rgba(43,18,80,.4));
    border: 1px dashed var(--rule-strong);
  }
  .t1 .ui-cta {
    background: linear-gradient(135deg, #7C3AED 0%, #5B21B6 100%);
    border-radius: 100px;
    padding: 8px 18px;
    font-family: var(--f-body);
    font-size: 12px;
    font-weight: 500;
    color: var(--mist);
    text-align: center;
    align-self: flex-start;
  }
</style>
</head>
<body>

<div class="frame t1 grain">

  <div class="content">
    <div class="eyebrow with-dot">EM PRODUÇÃO · SHOPIFY</div>
    <h1 class="headline">Provar antes de comprar.<br/>Sem vestir nada.</h1>
    <p class="sub">A cliente sobe uma foto. A IA mostra ela vestindo qualquer peça da sua loja em 15 segundos.</p>
  </div>

  <!-- Mockup placeholder — substituir .ui-demo pelo screenshot real depois -->
  <div class="mockup-wrap">
    <div class="mockup">
      <div class="mockup-bar">
        <span class="dot r"></span>
        <span class="dot y"></span>
        <span class="dot g"></span>
      </div>
      <div class="mockup-content">
        <div class="ui-demo">
          <div class="ui-card">
            <span class="ui-label">UPLOAD · CLIENTE</span>
            <div class="ui-shape"></div>
            <span class="ui-label" style="color:var(--lavender);opacity:.6;">SUA FOTO ↑</span>
          </div>
          <div class="ui-card">
            <span class="ui-label">RESULTADO · 15s</span>
            <div class="ui-shape" style="background: linear-gradient(135deg, rgba(12,200,158,.25), rgba(112,80,160,.3));border-color: rgba(12,200,158,.3);"></div>
            <span class="ui-cta">VER NA LOJA →</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer-mark">
    <svg class="gem" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g1a" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#C4B8E4" stop-opacity=".7"/><stop offset="100%" stop-color="#7050A0" stop-opacity=".5"/></linearGradient>
        <linearGradient id="g2a" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0CC89E" stop-opacity=".4"/><stop offset="100%" stop-color="#0CC89E" stop-opacity=".05"/></linearGradient>
        <linearGradient id="g3a" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8E2F8" stop-opacity=".9"/><stop offset="100%" stop-color="#B090D8" stop-opacity=".7"/></linearGradient>
      </defs>
      <polygon points="50,22 28,50 3,50 50,3" fill="url(#g1a)"/>
      <polygon points="50,22 72,50 97,50 50,3" fill="url(#g1a)"/>
      <polygon points="50,78 28,50 3,50 50,97" fill="url(#g2a)"/>
      <polygon points="50,78 72,50 97,50 50,97" fill="url(#g2a)"/>
      <polygon points="50,22 72,50 50,78 28,50" fill="url(#g3a)"/>
    </svg>
    <span class="text">REFLEXY</span>
  </div>
  <div class="footer-handle">reflexy.co</div>

</div>

</body>
</html>
