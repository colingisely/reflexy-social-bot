<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Reflexy · T2 Stat Single</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&family=DM+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_tokens.css">
<style>
  /* T2 · Stat Single
     Uso: prova social ("+34% conversao"), benchmark, manifesto numerico
     Numero gigante com 1 caractere em verdigris */
  .t2 .content {
    align-items: flex-start;
    justify-content: center;
    padding: 80px 80px 160px;
  }
  .t2 .stat-eyebrow {
    margin-bottom: 80px;
  }
  .t2 .stat-number {
    font-family: var(--f-mark);
    font-weight: 500;
    font-size: 360px;
    line-height: 0.9;
    letter-spacing: -.04em;
    color: var(--mist);
    display: flex;
    align-items: baseline;
    gap: 0;
  }
  .t2 .stat-number .unit {
    color: var(--verdigris);
    font-size: 220px;
    margin-left: 8px;
  }
  .t2 .stat-divider {
    width: 80px;
    height: 1px;
    background: var(--verdigris);
    opacity: .7;
    margin: 56px 0 32px;
  }
  .t2 .stat-label {
    font-family: var(--f-body);
    font-weight: 400;
    font-size: 32px;
    line-height: 1.4;
    color: var(--dusk);
    max-width: 760px;
  }
  .t2 .stat-label strong {
    color: var(--mist);
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="frame t2 grain">

  <div class="content">
    <div class="eyebrow stat-eyebrow">BENCHMARK · TRY-ON</div>
    <div class="stat-number">15<span class="unit">s</span></div>
    <div class="stat-divider"></div>
    <p class="stat-label">Tempo médio do <strong>try-on no Reflexy</strong>.<br/>Outras IAs do mercado: 2 a 5 minutos.</p>
  </div>

  <!-- Footer -->
  <div class="footer-mark">
    <svg class="gem" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g1b" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#C4B8E4" stop-opacity=".7"/><stop offset="100%" stop-color="#7050A0" stop-opacity=".5"/></linearGradient>
        <linearGradient id="g2b" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0CC89E" stop-opacity=".4"/><stop offset="100%" stop-color="#0CC89E" stop-opacity=".05"/></linearGradient>
        <linearGradient id="g3b" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8E2F8" stop-opacity=".9"/><stop offset="100%" stop-color="#B090D8" stop-opacity=".7"/></linearGradient>
      </defs>
      <polygon points="50,22 28,50 3,50 50,3" fill="url(#g1b)"/>
      <polygon points="50,22 72,50 97,50 50,3" fill="url(#g1b)"/>
      <polygon points="50,78 28,50 3,50 50,97" fill="url(#g2b)"/>
      <polygon points="50,78 72,50 97,50 50,97" fill="url(#g2b)"/>
      <polygon points="50,22 72,50 50,78 28,50" fill="url(#g3b)"/>
    </svg>
    <span class="text">REFLEXY</span>
  </div>
  <div class="footer-handle">reflexy.co</div>

</div>

</body>
</html>
